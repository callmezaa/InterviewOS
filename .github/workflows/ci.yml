name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  # ─── Security Audit ──────────────────────────────────
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

  # ─── Lint ────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  # ─── Typecheck ───────────────────────────────────────
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck

  # ─── Frontend Unit Tests ─────────────────────────────
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - name: Run frontend tests
        run: npm run test --workspace=apps/frontend
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend
          path: apps/frontend/coverage/
          retention-days: 7
          if-no-files-found: ignore

  # ─── Backend Unit & E2E Tests ────────────────────────
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 123456
          POSTGRES_DB: InterviewOS
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - name: Generate Prisma client
        run: npm run prisma:generate --workspace=apps/backend
        env:
          DATABASE_URL: postgresql://postgres:123456@localhost:5432/InterviewOS
      - name: Run Prisma migrations
        run: npm run prisma:migrate --workspace=apps/backend
        env:
          DATABASE_URL: postgresql://postgres:123456@localhost:5432/InterviewOS
      - name: Run backend unit tests
        run: npm run test --workspace=apps/backend
        env:
          DATABASE_URL: postgresql://postgres:123456@localhost:5432/InterviewOS
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
      - name: Run backend E2E tests
        run: npm run test:e2e --workspace=apps/backend
        env:
          DATABASE_URL: postgresql://postgres:123456@localhost:5432/InterviewOS
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-backend
          path: apps/backend/coverage/
          retention-days: 7
          if-no-files-found: ignore

  # ─── Build (waits for lint + typecheck only) ────────
  build:
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - name: Generate Prisma client
        run: npm run prisma:generate --workspace=apps/backend
        env:
          DATABASE_URL: postgresql://postgres:123456@localhost:5432/InterviewOS
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: apps/frontend/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('apps/frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-
      - name: Build all workspaces
        run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:123456@localhost:5432/InterviewOS

  # ─── Playwright E2E Tests ────────────────────────────
  test-e2e:
    needs: [build]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 123456
          POSTGRES_DB: InterviewOS
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Generate Prisma client
        run: npm run prisma:generate --workspace=apps/backend
        env:
          DATABASE_URL: postgresql://postgres:123456@localhost:5432/InterviewOS
      - name: Run Prisma migrations
        run: npm run prisma:migrate --workspace=apps/backend
        env:
          DATABASE_URL: postgresql://postgres:123456@localhost:5432/InterviewOS
      - name: Run Playwright E2E tests
        run: npx playwright test
        env:
          DATABASE_URL: postgresql://postgres:123456@localhost:5432/InterviewOS
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
