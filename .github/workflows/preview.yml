name: Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PREVIEW_TAG: pr-${{ github.event.pull_request.number }}

jobs:
  # ─── Deploy Preview ────────────────────────────────
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      backend_url: ${{ steps.deploy-backend.outputs.url || '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - name: Generate Prisma client
        run: npm run prisma:generate --workspace=apps/backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Build shared + backend
        run: npm run build --workspace=apps/shared && npm run build --workspace=apps/backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - id: deploy-backend
        name: Deploy backend preview to Railway
        run: |
          npx railway up \
            --service=${{ vars.RAILWAY_BACKEND_SERVICE || 'backend' }} \
            --environment=preview \
            --ci \
            --deploy=pr-${{ github.event.pull_request.number }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        continue-on-error: true
      - name: Wait for deployment
        run: sleep 30
      - name: Health check preview backend
        run: |
          URL="https://backend-pr-${{ github.event.pull_request.number }}.${{ vars.RAILWAY_DOMAIN || 'up.railway.app' }}"
          echo "Health-checking $URL/api/health"
          for i in $(seq 1 12); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%%{http_code}" "$URL/api/health" 2>/dev/null || echo "000")
            if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "204" ]; then
              echo "✅ Preview backend is healthy (status $HTTP_STATUS)"
              echo "url=$URL" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Attempt $i: got $HTTP_STATUS, retrying in 10s..."
            sleep 10
          done
          echo "❌ Preview backend health check failed"
          continue-on-error: true
      - name: Comment preview URL on PR
        uses: thollander/actions-comment-pull-request@v3
        with:
          message: |
            ## 🚀 Preview Deployment Ready

            | Environment | URL |
            |---|---|
            | **Frontend** | ✅ Auto-deployed by Vercel ([check here](https://github.com/${{ github.repository }}/deployments)) |
            | **Backend** | ${{ steps.deploy-backend.outputs.url && format('✅ [{0}]({0})', steps.deploy-backend.outputs.url) || '⚠️ Deploy might still be in progress' }} |

            > Commit: [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
          comment-tag: preview-deployment
          mode: upsert

  # ─── Destroy Preview ───────────────────────────────
  destroy-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete preview deployment comment
        uses: thollander/actions-comment-pull-request@v3
        with:
          message: |
            ~~Preview environment torn down.~~
          comment-tag: preview-deployment
          mode: delete
